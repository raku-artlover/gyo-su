<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKS - ぎょーすー</title>

<style>

body, html {
  margin: 0;
  padding: 0;
  font-family: "Helvetica", sans-serif;
  background: #fff;
  color: #000;
  overflow-x: hidden;
}

/* ────────────────
  固定ヘッダー白背景（ロゴ＋Sort の後ろ）
──────────────── */
.header-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 65px;              /* ロゴ位置に合わせた高さ */
  background: #fff;
  z-index: 900;              /* 画像より前に必ず来る */
  pointer-events: none;      /* この帯はクリック無効 */
}

/* ロゴ ＆ Sort は pointer-events 復活 */
.logo, .sort-menu-button {
  pointer-events: auto;
}

/* ロゴ */
.logo {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 30px;
  font-weight: bold;
  z-index: 950;
  color: #000;
  text-decoration: none;
}

/* Sort ボタン */
.sort-menu-button {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #000;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  z-index: 950;
  user-select: none;
}

/* Sort メニュー */
.sort-menu {
  position: fixed;
  top: 65px;
  right: 20px;
  background: #fff;
  border: 1px solid #000;
  border-radius: 8px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 960;
}

.sort-menu div {
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 1px solid #ddd;
}
.sort-menu div:last-child { border-bottom: none; }
.sort-menu div:hover {
  background: #000;
  color: #fff;
}

/* WORK ITEM（丸） */

.work-item {
  position: absolute;
  cursor: pointer;
  overflow: hidden;
  border-radius: 50%;
  transition:
    left 0.6s ease,
    top 0.6s ease,
    width 0.4s ease,
    height 0.4s ease,
    transform 0.4s ease;
  z-index: 100;
}

.work-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: filter 0.3s ease, transform 0.4s ease;
}

.work-item:hover img {
  filter: brightness(0.4);
  transform: scale(1.1);
}
.work-item.is-active img {
  filter: brightness(0.4);
  transform: scale(1.1);
}

.work-item.is-active .work-title {
  opacity: 1;
}

/* 作品名 */
.work-title {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 90%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #fff;
  font-weight: bold;
  text-shadow: 0 4px 10px rgba(0,0,0,0.8);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  line-height: 1.25em;
}

.work-title span,
.work-title dt {
  display: block;
}

.work-item:hover .work-title {
  opacity: 1;
}

/* Wrapper（画像は白帯の80px下から開始） */
#pageWrapper {
  position: relative;
  width: 100%;
  padding-top: 100px; /* ← 白帯分＋余白 */
}
</style>
</head>
<body>

<!-- 白背景帯（固定） -->
<div class="header-bar"></div>

<!-- 文字はこの帯の上に重ねる -->
<a href="index.html" class="logo">ぎょーすー</a>
<div class="sort-menu-button">Sort</div>

<div class="sort-menu">
  <div data-sort="asc">古い順</div>
  <div data-sort="desc">新しい順</div>
  <div data-sort="random">ランダム</div>
</div>



<div id="pageWrapper">

  <!-- ここから作品リスト（あなたのまま） -->
  <a class="work-item" href="works/work1.html" data-year="2023.3">
    <img src="img1.jpg">
    <div class="work-title">
      <span class="jp">いきものとして</span>
      <dt>As a Living Being</dt>
       <dt>As a Living Being</dt>
    </div>
  </a>

  <a class="work-item" href="works/work2.html" data-year="2024.5">
    <img src="img2.jpg">
    <div class="work-title">
      <span class="jp">街をやわらかくする</span>
      <dt>Softing the City</dt>
    </div>
  </a>
   <a class="work-item" href="works/work19.html" data-year="2024.3">
    <img src="img19.jpg">
    <div class="work-title">
      <span class="jp">Mr.</span>
      <dt></dt>
    </div>
  </a>

<script>
const wrapper = document.getElementById("pageWrapper");
const items = Array.from(document.querySelectorAll(".work-item"));

let currentSorted = items;

/* タイトルサイズ */
function applyTitleSize(size) {
  let fontJP = 22;
  let fontEN = 16;

  if (size >= 260) { fontJP = 22; fontEN = 16; }
  else if (size >= 230) { fontJP = 20; fontEN = 15; }
  else if (size >= 200) { fontJP = 18; fontEN = 14; }
  else if (size >= 160) { fontJP = 15; fontEN = 12; }
  else { fontJP = 13; fontEN = 11; }

  document.querySelectorAll(".work-title").forEach(t => {
    const jp = t.querySelector("span");
    const en = t.querySelector("dt");
    if (jp) jp.style.fontSize = fontJP + "px";
    if (en) en.style.fontSize = fontEN + "px";
  });
}

/* レイアウト */
function layoutItems(sorted) {
  currentSorted = sorted;

  const W = window.innerWidth;

  /* 列数判定 */
  let colCount;
  if (W <= 550) colCount = 2;
  else if (W <= 900) colCount = 3;
  else if (W <= 1300) colCount = 4;
  else colCount = 5;

  /* 比率 */
  const marginRatio = 0.10;
  const gapRatio = 0.06;

  const itemSize =
    W / (colCount + gapRatio * (colCount - 1) + marginRatio * 2);

  const margin = itemSize * marginRatio;
  const gap = itemSize * gapRatio;

  sorted.forEach(el => {
    el.style.width = itemSize + "px";
    el.style.height = itemSize + "px";
  });
  applyTitleSize(itemSize);

  const totalWidth = colCount * itemSize + gap * (colCount - 1) + margin * 2;
  const startX = (W - totalWidth) / 2 + margin;

  let maxBottom = 0;

  sorted.forEach((el, i) => {
    const col = i % colCount;
    const row = Math.floor(i / colCount);

    const x = startX + col * (itemSize + gap);
    const y = 120 + row * (itemSize + gap); /* ← 白帯の高さ 120 に変更 */

    el.style.left = x + "px";
    el.style.top = y + "px";

    maxBottom = Math.max(maxBottom, y + itemSize);
  });

  wrapper.style.height = maxBottom + 80 + "px";
}

/* 初期ランダム */
function init() {
  const shuffled = [...items].sort(() => Math.random() - 0.5);

  shuffled.forEach(el => {
    el.style.left = Math.random() * 200 + "px";
    el.style.top  = Math.random() * 150 + "px";
  });

  setTimeout(() => layoutItems(shuffled), 200);
}

init();

/* Sort */
const menuButton = document.querySelector(".sort-menu-button");
const menuBox = document.querySelector(".sort-menu");

menuButton.onclick = () => {
  menuBox.style.display =
    menuBox.style.display === "flex" ? "none" : "flex";
};

document.querySelectorAll(".sort-menu div").forEach(btn => {
  btn.onclick = () => {
    menuBox.style.display = "none";
    const type = btn.dataset.sort;
    let sorted = [...items];

    if (type === "asc") sorted.sort((a, b) => Number(a.dataset.year) - Number(b.dataset.year));
    if (type === "desc") sorted.sort((a, b) => Number(b.dataset.year) - Number(a.dataset.year));
    if (type === "random") sorted.sort(() => Math.random() - 0.5);

    layoutItems(sorted);
  };
});

/* リサイズ */
let lastWidth = window.innerWidth;
window.addEventListener("resize", () => {
  if (window.innerWidth !== lastWidth) {
    lastWidth = window.innerWidth;
    layoutItems(currentSorted);
  }
});

const isTouch = ('ontouchstart' in window);

if (isTouch) {

  let activeItem = null;
  let hideTimer = null;

  let startX = 0;
  let startY = 0;
  let moved = false;

  items.forEach(item => {

    item.addEventListener("touchstart", function(e){

      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      moved = false;

    }, {passive:true});


    item.addEventListener("touchmove", function(e){

      const moveX = Math.abs(
        e.touches[0].clientX - startX
      );

      const moveY = Math.abs(
        e.touches[0].clientY - startY
      );

      if(moveX > 10 || moveY > 10){
        moved = true;
      }

    }, {passive:true});


   item.addEventListener("touchend", function(e){

  // スクロールなら普通にスクロール
  if(moved){
    return;
  }

  // タップ時だけリンクを止める
  e.preventDefault();


  // タップ処理

      // タップ処理
      if(activeItem === this){

        window.location.href =
          this.getAttribute("href");

        return;
      }


      if(hideTimer){
        clearTimeout(hideTimer);
      }


      items.forEach(i=>{
        i.classList.remove("is-active");
      });


      this.classList.add("is-active");

      activeItem = this;


      hideTimer = setTimeout(()=>{

        this.classList.remove("is-active");
        activeItem = null;

      },2000);
     
     item.addEventListener("click", function(e){

  // タップでJS管理するので通常リンク停止
  e.preventDefault();

});


    });

  });

}


/* ─────────────────────────────── */



</script>

</body>
</html>
