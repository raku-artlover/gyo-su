<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART MARKET</title>


<style>


body{

margin:0;

font-family:Arial,sans-serif;

}


/* ヘッダー */

header{

height:80px;

display:flex;

align-items:center;

justify-content:center;

border-bottom:1px solid #ddd;

position:relative;

}



.logo{

font-size:25px;

font-weight:bold;

text-decoration:none;

color:black;

}



#menuBtn{

position:absolute;

left:20px;

font-size:28px;

background:none;

border:0;

cursor:pointer;

}



.header-right{

position:absolute;

right:20px;

display:flex;

gap:15px;

}



.header-right button{

font-size:22px;

background:none;

border:0;

cursor:pointer;

}




/* サイドバー */

#sidebar{

position:fixed;

top:0;

left:-300px;

width:230px;

height:100%;

background:white;

box-shadow:0 0 15px #aaa;

padding:40px;

transition:.3s;

z-index:10;

}


#sidebar.open{

left:0;

}



#sidebar a{

display:block;

margin:30px 0;

text-decoration:none;

color:black;

}





/* ログイン */

.login-area{

position:relative;

}



#login{


display:none;

position:absolute;

right:0;

top:40px;

background:white;

border:1px solid #ddd;

padding:30px;

width:220px;

z-index:20;

}



.login-area:hover #login{

display:block;

}





/* 商品 */

.products{


display:grid;

grid-template-columns:

repeat(4,1fr);

gap:30px;

padding:40px;


}



.item{

cursor:pointer;

}



.item img{

width:100%;

}



.item p{

margin:5px;

}



small{

color:#555;

}




/* 商品詳細 */

#detail{

display:none;

padding:40px;

}



#detail img{

width:400px;

}



button{

padding:10px 20px;

margin:5px;

}




</style>

</head>



<body>




<header>


<button id="menuBtn">

☰

</button>




<a href="index.html" class="logo">

ART MARKET

</a>




<div class="header-right">


<div class="login-area">


<button>

♙

</button>


<div id="login">


<h3>
ログイン
</h3>


<input placeholder="メール">


<br>


<input placeholder="パスワード">


<br>


<button>

ログイン

</button>



<hr>



<h3>

新規登録

</h3>


<button>

登録

</button>



</div>


</div>




<button>

🛒

</button>


</div>



</header>






<nav id="sidebar">


<button id="close">

×

</button>


<a href="index.html">
HOME
</a>


<a>
ITEM
</a>


<a>
ARTIST
</a>


<a>
NEWS
</a>


<a>
FAQ
</a>


<a>
CONTACT
</a>


</nav>







<main id="home">


<div class="products">



<div class="item"
onclick="showProduct(0)">


<img src="https://picsum.photos/400">


<p>
透明な器
</p>


<small>
山田太郎
</small>


<p>
¥30,000
</p>


</div>





<div class="item"
onclick="showProduct(1)">


<img src="https://picsum.photos/401">


<p>
夜の花
</p>


<small>
佐藤花子
</small>


<p>
¥50,000
</p>


</div>



</div>


</main>






<section id="detail">


<img id="detailImage">



<h1 id="name"></h1>


<h3 id="artist"></h3>


<p id="description"></p>


<h2 id="price"></h2>



<button>
🛒 カートに入れる
</button>


<button>
♡ お気に入り
</button>


<button>
問い合わせ
</button>



<h2>

その他のアイテム

</h2>



</section>








<script>


// サイドバー


const menu =
document.getElementById("menuBtn");


const sidebar =
document.getElementById("sidebar");



menu.onclick=function(){


sidebar.classList.add("open");


}




document.getElementById("close")
.onclick=function(){


sidebar.classList.remove("open");


}







// 商品データ


const products=[


{

name:"透明な器",

artist:"山田太郎",

price:"¥30,000",

img:"https://picsum.photos/600",

text:"金属と光をテーマにした作品"

},


{

name:"夜の花",

artist:"佐藤花子",

price:"¥50,000",

img:"https://picsum.photos/601",

text:"夜を表現した作品"

}


];







function showProduct(id){


let p=products[id];



document.getElementById("home")
.style.display="none";



document.getElementById("detail")
.style.display="block";



document.getElementById("detailImage")
.src=p.img;


document.getElementById("name")
.innerHTML=p.name;


document.getElementById("artist")
.innerHTML=p.artist;


document.getElementById("price")
.innerHTML=p.price;


document.getElementById("description")
.innerHTML=p.text;


}




</script>



</body>

</html>
