<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いきものとして</title>

<style>

body, html {
  margin: 0;
  padding: 0;
  font-family: "Helvetica", sans-serif;
  background: #fff;
  color: #000;
  overflow-x: hidden;
}

.logo {
  position:absolute;
  top: 20px;
  left: 50%;
  transform:translateX(-50%);
  font-size: 30px;
  font-weight: bold;
  z-index: 950;
  color: #000;
  text-decoration: none;
}


.container{
display:flex;
gap:70px;
padding:70px;
align-items:flex-start;
}

.gallery{
width:55%;
}

.main-image{
width:100%;
aspect-ratio:1 / 1;
object-fit:cover;
}

.thumbnail-area{
display:flex;
gap:15px;
margin-top:20px;
}

.thumbnail{
width:80px;
height:80px;
object-fit:cover;
cursor:pointer;
}

.info{
flex:1;
padding-top:30px;
}

.title{
font-size:40px;
font-weight:bold;
margin-bottom:30px;
}

.price{
font-size:25px;
margin-bottom:20px;
}

.artist{
font-size:14px;
margin-bottom:50px;
}

.description{
line-height:2;
max-width:400px;
}

button{
padding:15px 30px;
margin-top:40px;
background:white;
border:1px solid black;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<a href="index.html" class="logo">ぎょーすー</a>
</header>

<div class="container">

<div class="gallery">

<img id="mainImage" class="main-image" src="img1.jpg">

<div class="thumbnail-area">

<img class="thumbnail" src="../img2.jpg" onclick="changeImage('../img2.jpg')">

<img class="thumbnail" src="../img2_2.jpg" onclick="changeImage('../img2_2.jpg')">

<img class="thumbnail" src="../img2_3.jpg" onclick="changeImage('../img2_3.jpg')">

</div>

</div>


<div class="info">

<div class="title">
《いきものとして》
</div>

<div class="price">
¥300,000
</div>

<div class="artist">
渡邉 楽
</div>

<div class="description">
巨大な一円玉を通して、
普段当たり前に見ている価値や認識を問い直す作品。
<br><br>
素材：木
<br>
制作年：2024
</div>

<button>
🛒 カートに入れる
</button>

<br>

<button>
♡ お気に入り
</button>

</div>

</div>


<script>

function changeImage(src){
document.getElementById("mainImage").src = src;
}
@media(max-width:800px){

.container{
display:flex;
flex-direction:column;
gap:30px;
padding:30px;
}

.gallery{
width:100%;
}

.main-image{
width:100%;
aspect-ratio:1 / 1;
}

.thumbnail-area{
gap:10px;
margin-top:15px;
}

.thumbnail{
width:60px;
height:60px;
}

.info{
padding-top:0;
}

.title{
font-size:30px;
margin-bottom:20px;
}

.price{
font-size:22px;
margin-bottom:15px;
}

.artist{
font-size:14px;
margin-bottom:30px;
}

.description{
line-height:1.8;
}

button{
width:100%;
}

}
</script>

</body>
</html>
